services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingestor:
    build: .
    command: ["uv", "run", "python", "main.py", "ingestor"]
    env_file: .env
    environment:
      POSTGRES_URL: postgresql+asyncpg://trading:trading@postgres/trading
      REDIS_URL: redis://redis:6379
      DASHBOARD_HOST: "0.0.0.0"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-rsi:
    build: .
    command: ["uv", "run", "python", "main.py", "worker", "--algo", "rsi_mean_reversion"]
    env_file: .env
    environment:
      POSTGRES_URL: postgresql+asyncpg://trading:trading@postgres/trading
      REDIS_URL: redis://redis:6379
    depends_on:
      ingestor:
        condition: service_started
    restart: unless-stopped

  worker-linreg:
    build: .
    command: ["uv", "run", "python", "main.py", "worker", "--algo", "linreg_trend"]
    env_file: .env
    environment:
      POSTGRES_URL: postgresql+asyncpg://trading:trading@postgres/trading
      REDIS_URL: redis://redis:6379
    depends_on:
      ingestor:
        condition: service_started
    restart: unless-stopped

  worker-dpo:
    build: .
    command: ["uv", "run", "python", "main.py", "worker", "--algo", "dpo_mean_reversion"]
    env_file: .env
    environment:
      POSTGRES_URL: postgresql+asyncpg://trading:trading@postgres/trading
      REDIS_URL: redis://redis:6379
    depends_on:
      ingestor:
        condition: service_started
    restart: unless-stopped

  worker-squeeze:
    build: .
    command: ["uv", "run", "python", "main.py", "worker", "--algo", "squeeze_breakout"]
    env_file: .env
    environment:
      POSTGRES_URL: postgresql+asyncpg://trading:trading@postgres/trading
      REDIS_URL: redis://redis:6379
    depends_on:
      ingestor:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
